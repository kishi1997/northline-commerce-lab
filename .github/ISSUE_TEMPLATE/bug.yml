name: Bug
description: Report a reproducible defect.
title: "fix: "
labels: [bug]
body:
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Give the starting state, exact actions, and observed result.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment and evidence
      description: WordPress/WooCommerce/PHP versions, logs, screenshots, and affected viewport.

