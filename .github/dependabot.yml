version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      npm-development:
        patterns: ['*']
  - package-ecosystem: composer
    directory: /
    schedule:
      interval: weekly
    groups:
      composer-development:
        patterns: ['*']
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

