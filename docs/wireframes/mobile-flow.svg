<svg xmlns="http://www.w3.org/2000/svg" width="1840" height="1040" viewBox="0 0 1840 1040" role="img" aria-labelledby="title desc">
  <title id="title">Northline Commerce Lab mobile wireframes</title>
  <desc id="desc">Low fidelity mobile wireframes for home, catalog, product, cart, and checkout pages.</desc>
  <defs><style>
    .bg{fill:#e9eaec}.phone{fill:#fff;stroke:#202326;stroke-width:3}.bar{fill:#202326}.soft{fill:#f2f2f0;stroke:#c8c9c7}.mid{fill:#d8d9d7}.dark{fill:#555a5e}.accent{fill:#c66f3d}.note{fill:#fff7f0;stroke:#c66f3d;stroke-width:2}.label{font:700 20px Arial,sans-serif;fill:#202326}.small{font:12px Arial,sans-serif;fill:#42474a}.tiny{font:10px Arial,sans-serif;fill:#555a5e}.cap{font:700 10px Arial,sans-serif;letter-spacing:.8px;fill:#fff}.btn{fill:#202326}.btntext{font:700 11px Arial,sans-serif;fill:#fff}.white{fill:#fff}.center{text-anchor:middle}.thin{stroke:#c4c6c7}.dash{fill:none;stroke:#9a9d9f;stroke-dasharray:5 4}
  </style></defs>
  <rect class="bg" width="1840" height="1040"/><text x="50" y="48" class="label" style="font-size:28px">Northline Commerce Lab — Mobile-first wireframes</text><text x="50" y="74" class="small">375px viewport concept · thumb-friendly actions · progressive disclosure · persistent purchase context</text>

